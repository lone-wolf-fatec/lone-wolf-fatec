    <circle cx="890" cy="148" r="2.5" fill="#f5d84a" opacity="0.35"/>
    <path d="M0,260 Q150,220 300,250 Q450,280 600,240 Q750,200 900,240 Q1050,275 1200,250 L1200,300 L0,300 Z" fill="#080c18" opacity="0.85"/>
    <path d="M0,280 Q200,255 400,270 Q600,285 800,265 Q1000,245 1200,270 L1200,300 L0,300 Z" fill="#06080f"/>
  </g>
</svg>
