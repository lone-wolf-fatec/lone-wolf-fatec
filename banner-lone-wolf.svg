<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="50%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#12082a"/>
    </linearGradient>
    <radialGradient id="moonCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fffef0"/>
      <stop offset="70%" stop-color="#fde97a"/>
      <stop offset="100%" stop-color="#e8c040"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d84a" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#f5d84a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5d84a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softmoon"><feGaussianBlur stdDeviation="1.5"/></filter>
    <clipPath id="clip"><rect width="1200" height="300" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1200" height="300" fill="url(#sky)"/>
    <g fill="white">
      <circle cx="40"   cy="25"  r="1.1" opacity="0.8"/>
      <circle cx="110"  cy="48"  r="0.7" opacity="0.6"/>
      <circle cx="190"  cy="20"  r="1.3" opacity="0.9"/>
      <circle cx="280"  cy="55"  r="0.8" opacity="0.5"/>
      <circle cx="370"  cy="30"  r="1"   opacity="0.7"/>
      <circle cx="470"  cy="18"  r="0.9" opacity="0.8"/>
      <circle cx="700"  cy="42"  r="1.1" opacity="0.6"/>
      <circle cx="790"  cy="22"  r="0.8" opacity="0.9"/>
      <circle cx="870"  cy="58"  r="1.2" opacity="0.7"/>
      <circle cx="960"  cy="30"  r="0.9" opacity="0.5"/>
      <circle cx="1040" cy="50"  r="1"   opacity="0.8"/>
      <circle cx="1130" cy="20"  r="1.3" opacity="0.6"/>
      <circle cx="1180" cy="45"  r="0.7" opacity="0.9"/>
      <circle cx="75"   cy="80"  r="0.7" opacity="0.5"/>
      <circle cx="155"  cy="95"  r="1"   opacity="0.6"/>
      <circle cx="330"  cy="75"  r="0.8" opacity="0.7"/>
      <circle cx="450"  cy="90"  r="1.1" opacity="0.5"/>
      <circle cx="850"  cy="80"  r="0.9" opacity="0.6"/>
      <circle cx="1000" cy="70"  r="0.8" opacity="0.7"/>
      <circle cx="1150" cy="85"  r="1"   opacity="0.5"/>
    </g>
    <ellipse cx="185" cy="148" rx="105" ry="105" fill="url(#halo)"/>
    <circle cx="185" cy="148" r="68" fill="#f5d84a" opacity="0.12" filter="url(#softmoon)"/>
    <circle cx="185" cy="148" r="58" fill="url(#moonCenter)" filter="url(#glow)"/>
    <circle cx="200" cy="160" r="9" fill="#e2c038" opacity="0.25"/>
    <circle cx="168" cy="170" r="6" fill="#e2c038" opacity="0.2"/>
    <circle cx="195" cy="128" r="5" fill="#e2c038" opacity="0.18"/>
    <circle cx="215" cy="148" r="4" fill="#e2c038" opacity="0.15"/>
    <line x1="310" y1="148" x2="430" y2="148" stroke="#f5d84a" stroke-width="0.8" opacity="0.35"/>
    <circle cx="310" cy="148" r="2.5" fill="#f5d84a" opacity="0.35"/>
    <text x="600" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#f5e87a" letter-spacing="10" text-anchor="middle" opacity="0.96">LONE WOLF</text>
    <text x="600" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="none" stroke="#f5c030" stroke-width="1" letter-spacing="10" text-anchor="middle" opacity="0.2">LONE WOLF</text>
    <text x="600" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#9aabb8" letter-spacing="7" text-anchor="middle" opacity="0.75">E Q U I P E</text>
